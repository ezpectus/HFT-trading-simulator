# Shared Configuration — Global Trading System Settings
# =======================================================
# This file defines shared parameters used by all components.
# Individual components have their own config files for component-specific
# settings (exchange_simulator/config.yaml, ai-signal-bot/config/settings.yaml,
# hft-trade-bot/config/config.yaml).
#
# Sections:
#   system     — global system metadata and trading mode
#   symbols    — trading pairs shared across all components
#   exchanges  — simulated exchange identifiers
#   risk       — global risk limits (overridden by component configs if set)
#   timeframe  — candle interval shared between simulator and bots
#   account    — starting balance and leverage defaults
#   websocket  — host/port for inter-component communication

system:
  name: "HFT Trading System"
  version: "2.2.0"
  mode: "paper_trading"  # paper_trading | live (live not implemented)

# Symbols traded across all components — must match exchange simulator config
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT

# Exchanges (simulated) — order matters for UI display
exchanges:
  - binance
  - bybit
  - okx

# Default exchange for order execution when no preference is specified
default_exchange: binance

# Global risk parameters (shared between AI Signal Bot and HFT Trade Bot)
# Component-specific configs may override these values
risk:
  max_risk_per_trade_pct: 2.0    # Max loss per trade as % of balance
  max_daily_drawdown_pct: 8.0    # Stop trading if daily loss exceeds this
  min_confidence: 65.0           # Minimum signal confidence (0-100)
  min_rr_ratio: 1.5              # Minimum risk:reward ratio
  max_open_positions: 3          # Concurrent positions across all symbols
  max_position_size_pct: 10.0    # Max notional per position as % of balance

# Timeframe — must match across all components for consistent candle data
timeframe: "5m"                  # 1m | 3m | 5m | 15m | 30m | 1h | 4h | 1d
timeframe_seconds: 300           # Numeric equivalent (5m = 300s)

# Account defaults — starting balance and leverage for all exchanges
account:
  initial_balance: 10000.0       # Starting USDT balance per exchange
  currency: "USDT"
  leverage: 10                   # Default leverage (1-50, higher = more risk)

# Communication — WebSocket endpoints for inter-component messaging
websocket:
  exchange_simulator:
    host: localhost              # Exchange simulator WebSocket server
    port: 8765                   # Candles, orderbooks, accounts, fills
  ai_signal_bot:
    host: localhost              # AI signal publisher WebSocket server
    port: 8766                   # Signals, regime, backtest results
