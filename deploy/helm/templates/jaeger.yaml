{{- if .Values.jaeger.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hft.fullname" . }}-jaeger
  labels:
    {{- include "hft.labels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hft.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: jaeger
  template:
    metadata:
      labels:
        {{- include "hft.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: jaeger
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["--collector.otlp.enabled=true"]
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: otlp
              containerPort: 4317
              protocol: TCP
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hft.fullname" . }}-jaeger
  labels:
    {{- include "hft.labels" . | nindent 4 }}
spec:
  type: {{ .Values.jaeger.service.type }}
  ports:
    - name: ui
      port: {{ .Values.jaeger.service.uiPort }}
      targetPort: ui
    - name: otlp
      port: {{ .Values.jaeger.service.otlpPort }}
      targetPort: otlp
  selector:
    {{- include "hft.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: jaeger
{{- end }}
