{{- if .Values.webUi.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web-ui
  labels:
    {{- include "hft-trading-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hft-trading-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        {{- include "hft-trading-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web-ui
    spec:
      containers:
        - name: web-ui
          image: "{{ .Values.webUi.image.repository }}:{{ .Values.webUi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.webUi.port }}
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.webUi.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.webUi.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.webUi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-ui
  labels:
    {{- include "hft-trading-system.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webUi.port }}
      name: http
  selector:
    {{- include "hft-trading-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web-ui
{{- end -}}
