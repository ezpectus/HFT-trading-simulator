{{- if .Values.exchangeSimulator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-exchange_simulator
  labels:
    {{- include "hft-trading-system.labels" . | nindent 4 }}
    app.kubernetes.io/component: exchange_simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hft-trading-system.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: exchange_simulator
  template:
    metadata:
      labels:
        {{- include "hft-trading-system.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: exchange_simulator
    spec:
      containers:
        - name: exchange_simulator
          image: "{{ .Values.exchangeSimulator.image.repository }}:{{ .Values.exchangeSimulator.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["python", "-m", "exchange_simulator", "--no-visualizer"]
          env:
            - name: LOG_FORMAT
              value: {{ .Values.global.logFormat | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.global.logLevel | quote }}
          ports:
            - containerPort: {{ .Values.exchangeSimulator.ports.ws }}
              name: ws
            - containerPort: {{ .Values.exchangeSimulator.ports.metrics }}
              name: metrics
          livenessProbe:
            tcpSocket:
              port: {{ .Values.exchangeSimulator.ports.ws }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: {{ .Values.exchangeSimulator.ports.ws }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.exchangeSimulator.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-exchange_simulator
  labels:
    {{- include "hft-trading-system.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.exchangeSimulator.ports.ws }}
      name: ws
    - port: {{ .Values.exchangeSimulator.ports.metrics }}
      name: metrics
  selector:
    {{- include "hft-trading-system.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: exchange_simulator
{{- end -}}
