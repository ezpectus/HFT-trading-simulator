name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [exchange-simulator, ai-signal-bot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
        working-directory: ${{ matrix.component }}

  lint-cpp:
    name: Lint C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find hft-trade-bot/src -name "*.h" -o -name "*.cpp" \
            -not -path "*/fix/*" \
            | xargs clang-format --dry-run --Werror

  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json
      - run: npm ci || npm install
        working-directory: web-ui
      - run: npx eslint src/ --max-warnings 0
        working-directory: web-ui

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [exchange-simulator, ai-signal-bot]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.component }}/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
        working-directory: ${{ matrix.component }}
      - run: python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml
        working-directory: ${{ matrix.component }}
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.component }}
          path: ${{ matrix.component }}/coverage.xml
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.component }}
          path: logs/
          if-no-files-found: ignore

  test-cpp:
    name: C++ Build & Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc-13, clang-17]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ccache \
            libboost-dev libboost-system-dev \
            libssl-dev libwebsocketpp-dev \
            libspdlog-dev libfmt-dev \
            nlohmann-json3-dev libyaml-cpp-dev
          if [ "${{ matrix.compiler }}" = "clang-17" ]; then
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
            sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main"
            sudo apt-get update && sudo apt-get install -y clang-17
          else
            sudo apt-get install -y gcc-13 g++-13
          fi
      - uses: actions/cache@v4
        with:
          path: hft-trade-bot/build
          key: cpp-build-${{ matrix.compiler }}-${{ hashFiles('hft-trade-bot/CMakeLists.txt') }}
      - name: Build
        working-directory: hft-trade-bot
        run: |
          mkdir -p build && cd build
          if [ "${{ matrix.compiler }}" = "clang-17" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-17
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
          fi
          make -j$(nproc)
      - name: Run unit tests
        working-directory: hft-trade-bot/build
        run: ctest --output-on-failure
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-cpp-${{ matrix.compiler }}
          path: logs/
          if-no-files-found: ignore

  test-js:
    name: JS Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json
      - run: npm ci || npm install
        working-directory: web-ui
      - name: Run Vitest with coverage
        run: npx vitest run --coverage --passWithNoTests
        working-directory: web-ui
      - uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: web-ui/coverage/
      - name: Lint
        run: npx eslint src/ --max-warnings 0
        working-directory: web-ui

  build-js:
    name: Build & Bundle Analysis
    runs-on: ubuntu-latest
    needs: [test-js, lint-js]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json
      - run: npm ci || npm install
        working-directory: web-ui
      - name: Build
        run: npm run build
        working-directory: web-ui
      - name: Check bundle size
        run: |
          SIZE=$(du -sh web-ui/dist | cut -f1)
          echo "Bundle size: $SIZE"
          # Warn if dist > 5MB
          SIZE_KB=$(du -sk web-ui/dist | cut -f1)
          if [ "$SIZE_KB" -gt 5120 ]; then
            echo "::warning::Bundle size ($SIZE) exceeds 5MB target"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: web-ui/dist/

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [exchange-simulator, ai-signal-bot, hft-trade-bot, web-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  audit-deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package.json
      - run: npm ci || npm install
        working-directory: web-ui
      - run: npm audit --audit-level=high || true
        working-directory: web-ui
