# ─────────────────────────────────────────────────────────────────────────────
# Production configuration — real exchanges, real DB, real risk limits
# ─────────────────────────────────────────────────────────────────────────────
# C++20 HFT trading engine for live trading with:
#   - Real exchange WebSocket connections (Binance, OKX, Bybit)
#   - PostgreSQL trade persistence
#   - Redis hot state cache
#   - SHM IPC for Python↔C++ communication
#   - FIX 4.4 protocol support (optional)
#   - Kill switch with auto-cancel and auto-close
#   - Prometheus metrics on :9090
#
# API keys are read from environment variables (${VAR} syntax).
# Never hardcode API keys in this file.
#
# Sections:
#   system                    — mode, version, logging
#   exchange                  — real exchange connections + simulator fallback
#   ipc                       — shared memory IPC for Python↔C++
#   fix                       — FIX 4.4 session config (optional)
#   signal_engine_v2          — native C++ signal engine weights/thresholds
#   pressure_model            — L2 microstructure toxicity detection
#   smart_order_router        — cross-exchange order routing
#   adaptive_order_selector   — dynamic order type selection
#   risk                      — production risk limits + kill switch
#   database                  — PostgreSQL DSN and pool config
#   redis                     — hot state cache
#   metrics                   — Prometheus exporter
#   symbols                   — traded symbols with max leverage
#   latency_optimization      — thread pinning and queue sizes

system:
  mode: production          # production | simulator
  version: "3.0.0"
  log_level: info           # trace | debug | info | warn | error
  log_file: logs/hft_trade_bot.log

# ── Exchange configuration ──
# Active exchanges listed in priority order (first = primary for order routing)
exchange:
  active:
    - binance
    - okx
    - bybit

  fallback_to_simulator: true   # Fall back to local simulator if all real exchanges down
  simulator_ws_url: "ws://exchange_simulator:8765"

  binance:
    enabled: true
    ws_url: "wss://fstream.binance.com"    # Binance Futures WebSocket
    rest_url: "https://fapi.binance.com"   # Binance Futures REST API
    api_key: "${BINANCE_API_KEY}"          # Read from environment variable
    api_secret: "${BINANCE_API_SECRET}"
    rate_limit:
      weight_per_min: 1200                 # API weight limit per minute
      orders_per_10s: 300                  # Max orders per 10 seconds
      orders_per_min: 1200                 # Max orders per minute
    fees:
      maker_bps: 0.02                      # 0.02% maker fee
      taker_bps: 0.04                      # 0.04% taker fee

  okx:
    enabled: true
    ws_url: "wss://ws.okx.com:8443"        # OKX WebSocket
    rest_url: "https://www.okx.com"        # OKX REST API
    api_key: "${OKX_API_KEY}"
    api_secret: "${OKX_API_SECRET}"
    passphrase: "${OKX_PASSPHRASE}"        # OKX requires passphrase
    inst_type: "SWAP"                      # Instrument type: SWAP (perpetual)
    rate_limit:
      req_per_2s: 20                       # 20 requests per 2 seconds
      order_req_per_2s: 60                 # 60 order requests per 2 seconds
    fees:
      maker_bps: 0.02
      taker_bps: 0.05

  bybit:
    enabled: true
    ws_url: "wss://stream.bybit.com"       # Bybit WebSocket
    rest_url: "https://api.bybit.com"      # Bybit REST API
    api_key: "${BYBIT_API_KEY}"
    api_secret: "${BYBIT_API_SECRET}"
    category: "linear"                     # linear (USDT) | inverse (coin)
    rate_limit:
      orders_per_min: 120
      queries_per_min: 600
    fees:
      maker_bps: 0.01
      taker_bps: 0.06

# ── SHM IPC configuration ──
# Shared memory ring buffers for Python↔C++ communication
ipc:
  enabled: true
  signals:
    shm_name: "/hft_signals"               # Signal pipeline SHM
    capacity: 4096                         # Max items in ring buffer
  fills:
    shm_name: "/hft_fills"                 # Fill notifications SHM
    capacity: 4096
  market_data:
    shm_name: "/hft_market"                # Latest market snapshots
    max_symbols: 10                        # Max symbols to track
  kill_switch:
    shm_name: "/hft_kill_switch"           # Kill switch SHM flag
    trigger_file: "/tmp/kill_switch"       # File-based trigger (touch to activate)
    poll_interval_ms: 1000                 # Check interval

# ── FIX 4.4 session configuration ──
# Enable when connecting to a FIX gateway (e.g., institutional access)
fix:
  enabled: false                           # Enable when connecting to FIX gateway
  sender_comp_id: "HFTBOT"                 # Our sender ID
  target_comp_id: "EXCHANGE"               # Exchange's target ID
  seq_file: "logs/fix_seq.txt"             # Sequence number persistence
  heart_bt_int: 30                         # Heartbeat interval (seconds)
  username: "${FIX_USERNAME}"
  password: "${FIX_PASSWORD}"

# ── Signal engine v2 ──
# 6-indicator weighted composite (weights must sum to 1.0)
signal_engine_v2:
  enabled: true
  weights:
    ema: 0.20                              # EMA crossover weight
    rsi: 0.15                              # RSI momentum weight
    obi: 0.20                              # Order Book Imbalance weight
    vwap: 0.15                             # VWAP deviation weight
    adx: 0.10                              # ADX trend strength weight
    pressure: 0.20                         # L2 pressure model weight
  thresholds:
    min_confidence: 70                     # 0-100, reject below this
    min_composite: 0.35                    # |composite score| must exceed this
  periods:
    ema_fast: 9                            # Fast EMA period
    ema_slow: 21                           # Slow EMA period
    rsi_period: 14                         # RSI lookback
    adx_period: 14                         # ADX lookback
    vwap_window: 60                        # VWAP calculation window

# ── Pressure model ──
# L2 microstructure toxicity detection
pressure_model:
  enabled: true
  obi_levels: [5, 10, 20]                  # Order book depth levels for OBI
  toxicity_threshold: 0.7                  # Toxicity score above this = toxic
  microprice_enabled: true                 # Calculate microprice from L2

# ── Smart order router ──
# Routes orders across exchanges for best execution
smart_order_router:
  strategy: best_effective                 # best_price | lowest_latency | lowest_fees | best_effective | depth_aware
  anti_toxic_backoff: true                 # Back off from toxic exchanges
  toxic_threshold: 5                       # Skip exchange with ≥5 toxic events
  toxic_cooldown_seconds: 30               # Cooldown after toxicity detected

# ── Adaptive order selector ──
# Dynamically selects order type based on confidence + spread
adaptive_order_selector:
  enabled: true
  default_type: ioc                        # market | ioc | fok | gtd | post_only
  gtd_timeout_ms: 5000                     # GTD order timeout
  post_only_retries: 3                     # PostOnly retry count on cross

# ── Risk management (production) ──
# Stricter limits than dev config — real money at stake
risk:
  max_risk_per_trade_pct: 1.0              # 1% of equity per trade (prod: 0.5-2)
  max_daily_drawdown_pct: 5.0              # 5% daily drawdown limit (prod: 3-8)
  min_confidence: 70.0                     # Higher confidence required in prod
  min_rr_ratio: 2.0                        # 1:2 minimum risk:reward
  max_position_size_pct: 5.0               # 5% of equity per position
  max_open_positions: 5                    # Concurrent positions

  # Production-specific limits
  max_position_qty: 5.0                    # Max quantity per symbol
  max_total_exposure: 50000.0              # Max total notional in USD
  daily_loss_limit: 2000.0                 # Max daily loss in USD → triggers kill switch
  max_drawdown_pct: 0.10                   # 10% max drawdown from peak equity
  max_orders_per_second: 20                # Order rate throttle
  min_margin_ratio: 0.05                   # 5% minimum maintenance margin
  max_leverage: 10                         # Max leverage allowed

  blacklisted_symbols: []                  # Symbols to never trade

  # Kill switch — emergency stop
  kill_switch:
    enabled: true
    trigger_file: "/tmp/kill_switch"       # Touch this file to trigger
    auto_cancel_orders: true               # Cancel all open orders on trigger
    auto_close_positions: true             # Market-close all positions on trigger

# ── Database (PostgreSQL) ──
# Production uses PostgreSQL for persistent storage
database:
  dsn: "${POSTGRES_DSN}"                   # PostgreSQL connection string
  pool_min: 2                              # Min DB connections
  pool_max: 10                             # Max DB connections
  persist_trades: true                     # Store all trade fills
  persist_signals: true                    # Store all generated signals
  persist_positions: true                  # Store position history
  persist_candles: true                    # Store market data

# ── Redis (hot state cache) ──
# In-memory cache for frequently accessed state
redis:
  url: "${REDIS_URL}"                      # Redis connection URL
  enabled: true
  cache_ttl: 60                            # Cache TTL in seconds

# ── Prometheus metrics ──
# Metrics endpoint for monitoring
metrics:
  enabled: true
  port: 9090                               # Metrics HTTP server port
  host: "0.0.0.0"                          # Bind to all interfaces

# ── Symbols to trade ──
# Each symbol has an ID (for SHM packing) and max leverage
symbols:
  - name: BTCUSDT
    id: 0
    max_leverage: 20
  - name: ETHUSDT
    id: 1
    max_leverage: 20
  - name: SOLUSDT
    id: 2
    max_leverage: 10
  - name: BNBUSDT
    id: 3
    max_leverage: 10
  - name: XRPUSDT
    id: 4
    max_leverage: 10

# ── Latency optimization ──
# Pin threads to specific CPU cores for cache locality
latency_optimization:
  thread_pinning: true                     # Enable CPU core pinning
  signal_thread_core: 0                    # Signal engine thread → core 0
  execution_thread_core: 1                 # Order execution thread → core 1
  market_data_core: 2                      # Market data receiver → core 2
  spsc_queue_capacity: 16384               # Single-producer single-consumer queue size
  object_pool_size: 1024                   # Pre-allocated object pool size
