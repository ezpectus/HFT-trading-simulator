# HFT Trade Bot Configuration
# =============================
# C++20 sub-millisecond trading engine with dual signal path:
#   Fast path: Signal Engine V2 (native C++, < 1ms)
#   Slow path: AI Signal Bot via WebSocket :8766
#
# Sections:
#   trading                  — symbols, intervals, position limits
#   exchange                 — WebSocket endpoint for exchange simulator
#   risk                     — per-trade risk, drawdown, SL/TP defaults
#   hft_strategies           — V1 indicator toggles and periods
#   signal_engine_v2         — V2 native C++ signal engine parameters
#   pressure_model           — L2 microstructure toxicity detection
#   smart_order_router       — Cross-exchange order routing strategy
#   adaptive_order_selector  — Dynamic order type (IOC/FOK/GTD/PostOnly)
#   latency_optimization     — Thread pinning, latency histograms
#   logging                  — Log level and file path
#   ai_signal_bot            — Python AI bot WebSocket connection

trading:
  symbols:                      # Pairs to trade (must match exchange simulator)
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  signal_interval_seconds: 60   # How often to evaluate signals
  max_open_positions: 3         # Concurrent positions across all symbols
  paper_trading: true           # If true, no real orders are sent

exchange:
  websocket_url: "ws://localhost:8765"
  default_exchange: "binance"   # binance | bybit | okx

# Risk management — all percentages are of total account balance
risk:
  max_risk_per_trade_pct: 2.0   # Max loss per trade as % of balance (rec: 1-5)
  max_daily_drawdown_pct: 8.0   # Stop trading if daily loss exceeds this (rec: 5-15)
  min_confidence: 65.0          # Minimum signal confidence 0-100 to act
  min_rr_ratio: 1.5             # Minimum risk:reward ratio (rec: 1.5-3.0)
  stop_loss_pct: 2.0            # Default SL distance from entry % (rec: 1-5)
  take_profit_pct: 4.0          # Default TP distance from entry % (rec: 2-10)
  max_position_size_pct: 10.0   # Max notional per position as % of balance

# V1 Strategy toggles (fallback when signal_engine_v2.enabled = false)
hft_strategies:
  fast_ema_enabled: true
  fast_ema_period: 9            # Fast EMA period (must be < slow_ema_period)
  slow_ema_period: 21           # Slow EMA period
  obi_enabled: true             # Order Book Imbalance indicator
  vwap_enabled: true            # Volume-Weighted Average Price
  pressure_model_enabled: true  # L2 microstructure pressure
  fft_enabled: true             # FFT spectral analysis (requires >=64 candles)
  fft_min_candles: 64           # Minimum candles before FFT activates

# ─── Signal Engine V2 (native C++, no Python/LLM) ───
# 6-indicator weighted composite: EMA(21/50) 0.25, RSI(14) 0.15,
# OBI(5/10/20) 0.20, VWAP deviation 0.10, ADX(14) 0.10, Pressure 0.20
signal_engine_v2:
  enabled: true
  ema_fast_period: 21           # Fast EMA for crossover signals
  ema_slow_period: 50           # Slow EMA for crossover signals
  rsi_period: 14                # RSI lookback period
  adx_period: 14                # ADX trend strength lookback
  obi_levels: 20                # Order book levels for OBI calculation
  atr_period: 14                # ATR for volatility-based SL/TP
  sl_atr_mult: 1.5              # Stop loss = entry - 1.5×ATR (long)
  tp_atr_mult: 3.0              # Take profit = entry + 3.0×ATR (long)
  cooldown_ms: 5000             # Min time between signals (per symbol)
  buy_threshold: 0.3            # Composite score > 0.3 → BUY
  sell_threshold: -0.3          # Composite score < -0.3 → SELL
  min_confidence: 60            # 0-100, reject signals below this

# ─── Signal Engine V3 (HMM regime detection, optional) ───
# Extends V2 with Hidden Markov Model regime detection.
# When enabled, V3 replaces V2 in the analyze() call path.
signal_engine_v3:
  enabled: false                # Off by default — opt-in

# ─── Pressure Model (L2 microstructure) ───
pressure_model:
  toxic_size_threshold: 5.0     # Trades > 5× median size = toxic
  obi_threshold: 0.15           # |OBI| > 0.15 = significant imbalance
  pressure_threshold: 0.2       # |pressure| > 0.2 = significant

# ─── Smart Order Router V2 ───
# Routes orders across exchanges for best execution
smart_order_router:
  enabled: true
  strategy: 3                   # 0=BestPrice, 1=LowestLatency, 2=LowestFees, 3=BestEffective, 4=DepthAware
  toxic_threshold: 5            # Skip exchange with ≥5 toxic events

# ─── Adaptive Order Type Selection ───
# Dynamically selects IOC/FOK/GTD/PostOnly based on confidence + spread
adaptive_order_selector:
  enabled: true
  high_confidence: 80           # ≥80 + tight spread → IOC (immediate or cancel)
  low_confidence: 60            # <60 or wide spread → PostOnly (maker)
  emergency_confidence: 95      # ≥95 → FOK (fill or kill, urgent)
  gtd_seconds: 30               # GTD order expiry in seconds

# ─── Latency Optimization ───
latency_optimization:
  thread_pinning_enabled: false # Pin execution thread to dedicated CPU core
  execution_core_id: 0          # CPU core ID for thread pinning (0-indexed)
  latency_histogram_enabled: true # Track P50/P95/P99/P99.9 latency distributions

logging:
  level: "info"                 # debug | info | warn | error
  file: "logs/hft_trade_bot.log"

# AI Signal Bot connection (slow path, optional)
ai_signal_bot:
  enabled: true                 # If false, only V2 native engine is used
  websocket_url: "ws://localhost:8766"
